<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수학기호 게임</title>
    <!-- Tailwind CSS (스타일링) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- OmegaNum.js (초거대수 연산 라이브러리) -->
    <script src="https://cdn.jsdelivr.net/npm/omeganum.js@1.1.2/omeganum.min.js"></script>
    <style>
        /* 커스텀 스크롤바 및 애니메이션 */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
        
        @keyframes shimmer {
            100% { transform: translateX(100%); }
        }
        .shimmer-effect {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.05), transparent);
            transform: translateX(-100%);
            animation: shimmer 2s infinite;
        }
        
        body { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, 'Helvetica Neue', 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col selection:bg-cyan-500 selection:text-white">

    <!-- 로딩 스크린 -->
    <div id="loading" class="fixed inset-0 bg-slate-900 z-50 flex items-center justify-center text-2xl font-bold text-white">
        수학 엔진 로딩중...
    </div>

    <div class="container mx-auto px-4 py-8 flex-1 flex flex-col max-w-6xl hidden" id="gameUI">
        
        <!-- 헤더 / 점수 표시 영역 -->
        <header class="text-center mb-8">
            <h1 class="text-4xl md:text-5xl font-black text-cyan-400 drop-shadow-md tracking-tight mb-6">
                수학기호 게임 <span class="text-sm font-normal text-cyan-200 align-top">Web Opt.</span>
            </h1>
            
            <div class="bg-slate-800/80 border border-slate-700 rounded-2xl p-6 shadow-2xl backdrop-blur-sm inline-block min-w-[320px] max-w-full overflow-hidden">
                <div class="text-gray-400 text-sm font-semibold mb-1">현재 숫자</div>
                <div id="scoreDisplay" class="text-5xl md:text-6xl lg:text-7xl font-mono font-black text-white tracking-tighter break-all">
                    0
                </div>
                <div class="text-cyan-300 font-mono mt-3 font-medium text-lg md:text-xl">
                    + <span id="productionDisplay">0</span> / 초
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 flex-1">
            
            <!-- 기본 업그레이드 패널 -->
            <div class="lg:col-span-4 bg-slate-800 border border-slate-700 rounded-2xl p-5 shadow-lg flex flex-col gap-4">
                <div class="flex justify-between items-end border-b border-slate-700 pb-2 mb-2">
                    <h2 class="text-xl font-bold text-slate-200">기본 연산</h2>
                    <span id="autoBuyBadge" class="hidden text-xs bg-green-500/20 text-green-400 px-2 py-1 rounded-full font-bold">자동 구매 ON</span>
                </div>
                <div id="upgradesContainer" class="flex flex-col gap-3">
                    <!-- JS로 동적 생성됨 -->
                </div>
                <div class="mt-auto pt-4 text-xs text-slate-500 text-center leading-relaxed">
                    * 모든 연산은 0.1초마다 실행되며, 각 효과는 최적의 곱연산으로 중첩됩니다.<br>
                    * 비용은 항상 동일하며 가능한 최대 개수를 자동 구매합니다.
                </div>
            </div>

            <!-- 환생(Prestige) 패널 -->
            <div class="lg:col-span-8 bg-slate-800 border border-slate-700 rounded-2xl p-5 shadow-lg flex flex-col">
                <h2 class="text-xl font-bold text-purple-300 border-b border-slate-700 pb-2 mb-4">
                    로그 스케일 환생 (Prestige)
                </h2>
                
                <div id="prestigeContainer" class="grid grid-cols-1 md:grid-cols-2 gap-4 overflow-y-auto pr-2 custom-scrollbar">
                    <!-- JS로 동적 생성됨 -->
                </div>
            </div>
            
        </div>
        
        <!-- 푸터 / 세이브 컨트롤 -->
        <footer class="mt-8 flex flex-col sm:flex-row justify-between items-center text-xs text-slate-500 bg-slate-800/50 p-4 rounded-xl border border-slate-700/50">
            <div class="mb-2 sm:mb-0">
                데이터는 브라우저 로컬 스토리지에 자동 저장됩니다. (10초 주기)
                <span id="saveStatus" class="ml-2 text-green-400 opacity-0 transition-opacity">저장됨!</span>
            </div>
            <div class="flex gap-4">
                <button onclick="saveGame(true)" class="hover:text-cyan-400 transition">수동 저장</button>
                <button onclick="hardReset()" class="hover:text-red-400 transition">하드 리셋</button>
            </div>
        </footer>

    </div>

    <script>
        // === 게임 데이터 상수 ===
        const UPGRADE_COSTS = [10, 500, 25000];
        const UPGRADE_AMOUNTS = [1, 20, 500];

        const PRESTIGE_DATA = [
            { name: "환생 1", reqLog: 2, scale: 0.5, desc: "기본 배율에 1.1 거듭제곱 곱하기" },
            { name: "환생 2", reqLog: 6, scale: 0.45, desc: "초당 50% 추가 생산 (배율 적용)" },
            { name: "환생 3", reqLog: 20, scale: 0.4, desc: "전체 생산량을 1.05만큼 제곱 (기본연산 자동구매)" },
            { name: "환생 4", reqLog: 80, scale: 0.35, desc: "숫자 log10에 +1 후 팩토리얼 배율 적용" },
            { name: "환생 5", reqLog: 300, scale: 0.3, desc: "숫자 log-log에 +1 후 테트레이션 배율" },
            { name: "환생 V2-1", reqLog: 1500, scale: 0.2, desc: "펜테이션 스케일 곱연산" },
            { name: "환생 V2-2", reqLog: 8000, scale: 0.15, desc: "헥세이션 스케일 곱연산" },
            { name: "환생 V2-3", reqLog: 40000, scale: 0.1, desc: "헵테이션 스케일 곱연산" }
        ];

        // === 게임 상태 (State) ===
        let ON; // OmegaNum 전역 객체
        let gameState = {
            score: null,
            production: null,
            up: [],
            prestiges: []
        };

        // DOM 캐싱 (성능 최적화용)
        const DOM = {
            score: document.getElementById('scoreDisplay'),
            prod: document.getElementById('productionDisplay'),
            upgrades: [],
            prestiges: [],
            autoBuyBadge: document.getElementById('autoBuyBadge'),
            saveStatus: document.getElementById('saveStatus')
        };

        // === 초기화 및 로드 ===
        window.onload = () => {
            if (typeof OmegaNum === 'undefined') {
                alert('수학 라이브러리를 불러오지 못했습니다. 인터넷 연결을 확인해주세요.');
                return;
            }
            ON = OmegaNum;
            initGame();
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('gameUI').classList.remove('hidden');
            startGameLoop();
        };

        function initGame() {
            gameState.score = ON(0);
            gameState.production = ON(0);
            gameState.up = [ON(0), ON(0), ON(0)];
            gameState.prestiges = Array(PRESTIGE_DATA.length).fill(ON(0));

            loadGame();
            buildUI();
            updateUI(); // 초기 UI 업데이트
        }

        // === UI 동적 생성 ===
        function buildUI() {
            // 업그레이드 UI 생성
            const upContainer = document.getElementById('upgradesContainer');
            upContainer.innerHTML = '';
            for (let i = 0; i < 3; i++) {
                const btn = document.createElement('button');
                btn.className = 'relative overflow-hidden group flex flex-col p-4 rounded-xl border text-left transition-all duration-200';
                btn.onclick = () => buyUpgrade(i);
                
                btn.innerHTML = `
                    <div class="flex justify-between items-start w-full z-10">
                        <span class="font-bold text-lg">+${UPGRADE_AMOUNTS[i]} / 틱</span>
                        <span class="bg-slate-900 px-2 py-1 rounded text-xs font-mono text-cyan-300 border border-slate-700">보유: <span id="upCount_${i}">0</span></span>
                    </div>
                    <div class="mt-2 text-sm text-slate-400 z-10 flex justify-between items-center w-full">
                        <span>비용: <span class="font-mono text-white">${formatON(ON(UPGRADE_COSTS[i]))}</span></span>
                        <span class="text-[10px] bg-slate-700 px-1.5 py-0.5 rounded text-slate-300">최대 구매</span>
                    </div>
                    <div class="shimmer-effect hidden"></div>
                `;
                upContainer.appendChild(btn);
                DOM.upgrades.push({
                    btn: btn,
                    count: document.getElementById(`upCount_${i}`),
                    shimmer: btn.querySelector('.shimmer-effect')
                });
            }

            // 환생 UI 생성
            const pContainer = document.getElementById('prestigeContainer');
            pContainer.innerHTML = '';
            for (let i = 0; i < PRESTIGE_DATA.length; i++) {
                const data = PRESTIGE_DATA[i];
                const div = document.createElement('div');
                div.className = 'bg-slate-900 border border-slate-700 rounded-xl p-4 flex flex-col relative overflow-hidden group';
                
                div.innerHTML = `
                    <div class="absolute bottom-0 left-0 h-1 bg-purple-900/30 w-full z-0">
                        <div id="pProgress_${i}" class="h-full bg-purple-500 shadow-[0_0_10px_#a855f7] transition-all duration-200 ease-linear" style="width: 0%"></div>
                    </div>
                    
                    <div class="flex justify-between items-center mb-2 z-10">
                        <h3 class="font-bold text-purple-300 text-lg group-hover:text-purple-200 transition-colors">${data.name}</h3>
                        <span class="text-xs font-mono bg-purple-900/50 text-purple-200 px-2 py-1 rounded border border-purple-700/50">
                            보유: <span id="pCount_${i}">0</span>
                        </span>
                    </div>
                    
                    <p class="text-sm text-slate-400 mb-4 min-h-[40px] z-10 leading-snug break-keep">${data.desc}</p>
                    
                    <button id="pBtn_${i}" onclick="doPrestige(${i})" class="mt-auto py-2.5 px-4 rounded-lg font-bold transition-all duration-200 z-10 flex flex-col items-center justify-center">
                        <span id="pBtnText1_${i}"></span>
                        <span id="pBtnText2_${i}" class="text-[10px] mt-0.5 opacity-80"></span>
                    </button>
                `;
                pContainer.appendChild(div);
                DOM.prestiges.push({
                    count: document.getElementById(`pCount_${i}`),
                    progress: document.getElementById(`pProgress_${i}`),
                    btn: document.getElementById(`pBtn_${i}`),
                    btnText1: document.getElementById(`pBtnText1_${i}`),
                    btnText2: document.getElementById(`pBtnText2_${i}`)
                });
            }
        }

        // === 핵심 계산 로직 ===
        function calcProduction() {
            let base = ON.add(
                gameState.up[0].mul(UPGRADE_AMOUNTS[0]), 
                gameState.up[1].mul(UPGRADE_AMOUNTS[1])
            ).add(gameState.up[2].mul(UPGRADE_AMOUNTS[2]));
            
            if (base.eq(0)) return base;

            const P = gameState.prestiges;

            // 환생 1: 1.1 ^ R1
            if (P[0].gt(0)) base = base.mul(ON.pow(1.1, P[0]));
            
            // 환생 2: 1 + 0.5 * R2
            if (P[1].gt(0)) base = base.mul(ON.add(1, P[1].mul(0.5)));
            
            // 환생 3: 1.05 제곱
            if (P[2].gt(0) && base.gt(1)) {
                let r3_eff = ON.add(1, P[2].mul(0.05));
                base = ON.pow(base, r3_eff);
            }
            
            // 환생 4: log10(score)+1 의 팩토리얼 (Stirling 근사)
            if (P[3].gt(0)) {
                let logS = gameState.score.max(1).log10().floor().add(1);
                let e = Math.E, pi = Math.PI;
                let term1 = logS.mul(ON.log10(logS.div(e)));
                let term2 = ON.log10(logS.mul(2 * pi)).mul(0.5);
                let logFact = term1.add(term2).max(0);
                let r4_eff = ON.pow(10, logFact).pow(P[3]);
                base = base.mul(r4_eff);
            }
            
            // 환생 5: log-log(score)+1 의 테트레이션
            if (P[4].gt(0)) {
                let llS = gameState.score.max(10).log10().max(1).log10().floor().add(1);
                let height = Math.min(10, llS.toNumber()); 
                let r5_eff = ON.arrow(10, 2, height);
                base = base.mul(ON.pow(r5_eff, P[4]));
            }
            
            // 환생 V2 계열 (거대 연산)
            if (P[5].gt(0)) base = base.mul(ON.arrow(10, 3, P[5].add(1))); // 펜테이션
            if (P[6].gt(0)) base = base.mul(ON.arrow(10, 4, P[6].add(1))); // 헥세이션
            if (P[7].gt(0)) base = base.mul(ON.arrow(10, 5, P[7].add(1))); // 헵테이션
            
            return base;
        }

        function calcPrestigeReward(tierIdx) {
            let data = PRESTIGE_DATA[tierIdx];
            let logS = gameState.score.max(1).log10();
            if (logS.lt(data.reqLog)) return ON(0);
            
            let ratio = logS.div(data.reqLog);
            return ratio.pow(data.scale).floor();
        }

        // === 액션 로직 ===
        function buyUpgrade(idx) {
            let cost = ON(UPGRADE_COSTS[idx]);
            if (gameState.score.gte(cost)) {
                let amount = gameState.score.div(cost).floor();
                gameState.score = gameState.score.sub(amount.mul(cost));
                gameState.up[idx] = gameState.up[idx].add(amount);
                fastUpdateUI(); // 구매 즉시 숫자 갱신
            }
        }

        function doPrestige(tierIdx) {
            let reward = calcPrestigeReward(tierIdx);
            if (reward.lte(0)) return;

            // 보상 지급
            gameState.prestiges[tierIdx] = gameState.prestiges[tierIdx].add(reward);

            // 하위 티어 초기화 (계층형 리셋)
            gameState.score = ON(0);
            gameState.up = [ON(0), ON(0), ON(0)];
            for (let i = 0; i < tierIdx; i++) {
                gameState.prestiges[i] = ON(0);
            }
            
            updateUI();
            saveGame();
        }

        // === 게임 루프 ===
        function startGameLoop() {
            // 메인 틱: 0.1초 (100ms) - 점수 및 생산량 계산
            setInterval(() => {
                const prod = calcProduction();
                gameState.production = prod.mul(10); // 초당 생산량 표시용 (*10)
                gameState.score = gameState.score.add(prod); // 0.1초치 점수 추가
                
                // 환생 3 자동 구매 로직
                if (gameState.prestiges[2].gt(0)) {
                    for(let i=0; i<3; i++) {
                        let cost = ON(UPGRADE_COSTS[i]);
                        if (gameState.score.gte(cost)) {
                            let amount = gameState.score.div(cost).floor();
                            gameState.score = gameState.score.sub(amount.mul(cost));
                            gameState.up[i] = gameState.up[i].add(amount);
                        }
                    }
                }
                
                fastUpdateUI();
            }, 100);

            // 서브 틱: 0.5초 (500ms) - 환생 버튼 상태 및 프로그레스바 갱신 (부하 방지)
            setInterval(() => {
                updatePrestigeUI();
            }, 500);

            // 오토 세이브: 10초
            setInterval(() => saveGame(true), 10000);
        }

        // === UI 업데이트 (최적화) ===
        // 매 0.1초마다 호출: 필요한 텍스트 노드만 변경하여 렌더링 부하 최소화
        function fastUpdateUI() {
            DOM.score.textContent = formatON(gameState.score);
            DOM.prod.textContent = formatON(gameState.production);
            
            // 업그레이드 버튼 상태
            for (let i = 0; i < 3; i++) {
                DOM.upgrades[i].count.textContent = formatON(gameState.up[i]);
                let cost = ON(UPGRADE_COSTS[i]);
                let canBuy = gameState.score.gte(cost);
                let btn = DOM.upgrades[i].btn;
                let shim = DOM.upgrades[i].shimmer;
                
                if (canBuy) {
                    btn.className = 'relative overflow-hidden group flex flex-col p-4 rounded-xl border text-left transition-all duration-200 bg-slate-700 border-slate-600 hover:bg-slate-600 hover:border-cyan-500 cursor-pointer shadow-md';
                    shim.classList.remove('hidden');
                } else {
                    btn.className = 'relative overflow-hidden group flex flex-col p-4 rounded-xl border text-left transition-all duration-200 bg-slate-800/50 border-slate-800 opacity-60 cursor-not-allowed';
                    shim.classList.add('hidden');
                }
            }

            // 자동구매 뱃지 표시
            if (gameState.prestiges[2].gt(0)) {
                DOM.autoBuyBadge.classList.remove('hidden');
            } else {
                DOM.autoBuyBadge.classList.add('hidden');
            }
        }

        // 매 0.5초 호출: 환생 패널 (상대적으로 무거운 계산)
        function updatePrestigeUI() {
            let logS = gameState.score.max(1).log10().toNumber();
            
            for (let i = 0; i < PRESTIGE_DATA.length; i++) {
                DOM.prestiges[i].count.textContent = formatON(gameState.prestiges[i]);
                
                let data = PRESTIGE_DATA[i];
                let reward = calcPrestigeReward(i);
                let canPrestige = reward.gt(0);
                let percent = Math.min(100, Math.max(0, (logS / data.reqLog) * 100));
                
                DOM.prestiges[i].progress.style.width = `${percent}%`;
                
                let btn = DOM.prestiges[i].btn;
                if (canPrestige) {
                    btn.className = 'mt-auto py-2.5 px-4 rounded-lg font-bold transition-all duration-200 z-10 flex flex-col items-center justify-center bg-purple-600 hover:bg-purple-500 text-white shadow-[0_0_15px_rgba(168,85,247,0.4)] hover:shadow-[0_0_25px_rgba(168,85,247,0.6)] cursor-pointer';
                    DOM.prestiges[i].btnText1.innerHTML = `초기화 후 <span class="font-mono text-cyan-200">+${formatON(reward)}</span> 획득`;
                    DOM.prestiges[i].btnText2.textContent = "클릭하여 환생하기";
                } else {
                    btn.className = 'mt-auto py-2.5 px-4 rounded-lg font-bold transition-all duration-200 z-10 flex flex-col items-center justify-center bg-slate-800 text-slate-500 border border-slate-700 cursor-not-allowed';
                    DOM.prestiges[i].btnText1.textContent = `목표: e${data.reqLog}`;
                    DOM.prestiges[i].btnText2.textContent = `(현재: ${percent.toFixed(1)}%)`;
                }
            }
        }

        // 전체 강제 업데이트 (초기화 또는 환생 직후)
        function updateUI() {
            fastUpdateUI();
            updatePrestigeUI();
        }

        // === 유틸 함수 ===
        function formatON(num) {
            if (!num) return "0";
            if (num.lt(1000)) return Math.floor(num.toNumber()).toString();
            if (num.lt(1e6)) return Math.floor(num.toNumber()).toLocaleString();
            
            if (num.lt(ON.pow(10, 1000))) {
                let log = num.log10().floor();
                let mantissa = num.div(ON.pow(10, log)).toNumber();
                return `${mantissa.toFixed(2)}e${log}`;
            }
            if (num.lt(ON.pow(10, 1e6))) {
                return `e${Math.floor(num.log10().toNumber()).toLocaleString()}`;
            }
            
            let loglog = num.log10().log10().floor();
            return `ee${Math.floor(loglog.toNumber()).toLocaleString()}`;
        }

        // === 세이브 & 로드 ===
        const SAVE_KEY = 'math_game_web_save';
        
        function saveGame(showIndicator = false) {
            const data = {
                score: gameState.score.toString(),
                up: gameState.up.map(v => v.toString()),
                prestiges: gameState.prestiges.map(v => v.toString())
            };
            localStorage.setItem(SAVE_KEY, JSON.stringify(data));
            
            if (showIndicator) {
                DOM.saveStatus.style.opacity = '1';
                setTimeout(() => DOM.saveStatus.style.opacity = '0', 2000);
            }
        }

        function loadGame() {
            const saved = localStorage.getItem(SAVE_KEY);
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    if(data.score) gameState.score = ON(data.score);
                    if(data.up) gameState.up = data.up.map(v => ON(v));
                    if(data.prestiges) gameState.prestiges = data.prestiges.map(v => ON(v));
                } catch (e) {
                    console.error("세이브 로드 에러:", e);
                }
            }
        }

        function hardReset() {
            if (confirm('정말로 모든 진행 상황을 초기화하시겠습니까?\n이 작업은 되돌릴 수 없습니다.')) {
                localStorage.removeItem(SAVE_KEY);
                location.reload();
            }
        }
    </script>
</body>
</html>

```
