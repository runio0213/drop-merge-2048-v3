  <style>
    /* 1초 낙하 및 모션용 하드웨어 가속 최적화 애니메이션 */
    @keyframes fall-down {
      0% {
        transform: translate3d(0, -410px, 0);
        opacity: 0.85;
      }
      100% {
        transform: translate3d(0, 0, 0);
        opacity: 1;
      }
    }
    @keyframes merge-pop {
      0% { transform: scale(1); }
      50% { transform: scale(1.18); filter: brightness(1.08); }
      100% { transform: scale(1); }
    }
    @keyframes block-pop {
      0% { transform: scale(1); opacity: 1; }
      100% { transform: scale(0); opacity: 0; }
    }
    @keyframes combo-up {
      0% { transform: scale(0.5); opacity: 0; }
      50% { transform: scale(1.3); opacity: 1; }
      100% { transform: scale(1); opacity: 0; }
    }

      will-change: transform, opacity;

    .animate-merge-pop {

    /* 모바일 환경 스크롤 방지 및 조작 최적화 */

        <!-- SWAP -->

    <!-- 5X7 메인 게임판 -->
    <div id="game-board-container" class="flex justify-between gap-1.5 p-2 bg-gray-50/80 rounded-2xl border border-gray-100 transition-all duration-300">
      <!-- 5개 열 동적 렌더링 영역 -->
    </div>

    <!-- 하단 무제한 망치 제어 바 -->
    <div class="mt-4 flex justify-center">
      <button id="btn-hammer" class="flex items-center space-x-1.5 px-5 py-3 rounded-2xl font-bold border border-gray-200 bg-white text-gray-700 shadow-md hover:border-gray-300 transition-all duration-200 active:scale-95">
        <i data-lucide="hammer" class="w-5 h-5"></i>
        <span class="text-xs" id="hammer-text">무제한 망치 사용</span>

  </div>

  <script>
    // --- 게임 핵심 엔진 상수 및 상태 설정 ---
    const MAX_ROWS = 7;
    const COLS = 5;
    const ENTIRE_POOL = [2, 4, 8, 16, 32, 64, 128];

    let board = Array.from({ length: COLS }, () => []);
    let currentBlock = 2;
    let nextBlock = 4;
    let score = 0;
    let mergeScore = 0;  // 합성 누적 점수
    let dropsCount = 0;  // 블록 놓은 횟수
    let maxCombo = 0;    // 연속 합성 최고 기록
    let maxBlock = 2;
    let minSpawnValue = 2;
    let gameOver = false;
    let isHammerActive = false;
    let isAnimating = false;

    // 히스토리 리스트 (되돌리기용)
    let historyStack = [];

    // --- DOM 요소 참조 ---
    const boardContainer = document.getElementById('game-board-container');
    const uiScore = document.getElementById('ui-score');
    const uiHighest = document.getElementById('highest-val');
    const uiDrops = document.getElementById('ui-drops');
    const uiMergeScore = document.getElementById('ui-merge-score');
    const uiMaxCombo = document.getElementById('ui-max-combo');
    const btnUndo = document.getElementById('btn-undo');
    const btnReset = document.getElementById('btn-reset');
    const btnOverReset = document.getElementById('btn-over-reset');
    const btnSwap = document.getElementById('btn-swap');
    const btnHammer = document.getElementById('btn-hammer');
    const hammerText = document.getElementById('hammer-text');
    const blockCurrent = document.getElementById('block-current');
    const blockNext = document.getElementById('block-next');
    const gameOverScreen = document.getElementById('game-over-screen');
    const spawnBanner = document.getElementById('spawn-banner');
    const bannerMin = document.getElementById('banner-min');
    const comboContainer = document.getElementById('combo-container');

    // --- 파스텔 색상 획득 엔진 ---
    function getBlockStyle(val) {
      if (!val) return {};
      const power = Math.log2(val);
      const hue = (power * 43) % 360;
      return {
        background: `hsl(${hue}, 75%, 80%)`,
        color: '#4a5568',
        borderColor: 'rgba(255, 255, 255, 0.45)'
      };
    }

    function formatNumber(num) {
      if (num < 1000) return num.toString();
      if (num < 1000000) return (num / 1000).toFixed(1).replace('.0', '') + 'K';
      if (num < 1000000000) return (num / 1000000).toFixed(1).replace('.0', '') + 'M';
      if (num < 1000000000000) return (num / 1000000000).toFixed(1).replace('.0', '') + 'B';
      return (num / 1000000000000).toFixed(1).replace('.0', '') + 'T';
    }

    // --- 히스토리 백업 관리 ---
    function saveToHistory() {
      historyStack.push({
        board: board.map(col => [...col]),
        currentBlock,
        nextBlock,
        score,
        mergeScore,
        dropsCount,
        maxCombo,
        maxBlock,
        minSpawnValue
      });
      if (historyStack.length > 50) historyStack.shift();
      updateUndoButton();
    }

    function handleUndo() {
      if (isAnimating || historyStack.length === 0) return;
      const prev = historyStack.pop();
      
      board = prev.board;
      currentBlock = prev.currentBlock;
      nextBlock = prev.nextBlock;
      score = prev.score;
      mergeScore = prev.mergeScore;
      dropsCount = prev.dropsCount;
      maxCombo = prev.maxCombo;
      maxBlock = prev.maxBlock;
      minSpawnValue = prev.minSpawnValue;

      gameOver = false;
      isHammerActive = false;
      gameOverScreen.classList.add('hidden');
      
      updateUndoButton();
      updateStaticUI();
      renderBoard();
    }

    function updateUndoButton() {
      if (historyStack.length > 0 && !isAnimating) {
        btnUndo.disabled = false;
        btnUndo.classList.remove('bg-gray-50', 'text-gray-300', 'cursor-not-allowed');
        btnUndo.classList.add('bg-indigo-50', 'text-indigo-600', 'border-indigo-100', 'hover:bg-indigo-100', 'active:scale-90');
      } else {
        btnUndo.disabled = true;
        btnUndo.classList.remove('bg-indigo-50', 'text-indigo-600', 'border-indigo-100', 'hover:bg-indigo-100', 'active:scale-90');
        btnUndo.classList.add('bg-gray-50', 'text-gray-300', 'cursor-not-allowed');
      }
    }

    // --- 최저 스폰 잠금 마일스톤 계산 (512부터 작동하도록 개선) ---
    function updateSpawnPool(highest) {
      let newMin = 2;
      
      if (highest >= 16384) {
        newMin = 128; // 16384 도달 시 2, 4, 8, 16, 32, 64 모두 배제 (최소 128)
      } else if (highest >= 8192) {
        newMin = 64;  // 8192 도달 시 최소 64
      } else if (highest >= 4096) {
        newMin = 32;  // 4096 도달 시 최소 32
      } else if (highest >= 2048) {
        newMin = 16;  // 2048 도달 시 최소 16
      } else if (highest >= 1024) {
        newMin = 8;   // 1024 도달 시 최소 8
      } else if (highest >= 512) {
        newMin = 4;   // 512 도달 시 최저 숫자 2 잠금 (최소 4)
      }
      
      if (newMin !== minSpawnValue) {
        minSpawnValue = newMin;
        bannerMin.textContent = formatNumber(minSpawnValue);
        if (minSpawnValue > 2) {
          spawnBanner.classList.remove('hidden');
        } else {
          spawnBanner.classList.add('hidden');
        }
      }
      return newMin;
    }

    function getRandomBlock(currentMin = minSpawnValue) {
      const activePool = ENTIRE_POOL.filter(val => val >= currentMin);
      if (activePool.length === 0) return currentMin;

      const weights = [45, 30, 15, 7, 2, 1].slice(0, activePool.length);
      const sum = weights.reduce((a, b) => a + b, 0);
      let rand = Math.random() * sum;
      
      for (let i = 0; i < weights.length; i++) {
        if (rand < weights[i]) return activePool[i];
        rand -= weights[i];
      }
      return activePool[0];
    }

    // --- 콤보 시각 알림 레이어 팝업 ---
    function triggerComboPopup(combo) {
      if (combo <= 0) return;
      const textDiv = document.createElement('div');
      textDiv.className = "text-center select-none font-black text-rose-500 text-3xl italic tracking-wider animate-combo absolute drop-shadow-md";
      textDiv.textContent = `${combo} COMBO!`;
      
      const randomOffset = (Math.random() - 0.5) * 60;
      textDiv.style.transform = `translate3d(${randomOffset}px, 0, 0)`;
      
      comboContainer.appendChild(textDiv);
      setTimeout(() => textDiv.remove(), 800);
    }

    // --- 핵심 비동기 다중 합성 & 최근 낙하 줄 수렴 엔진 ---
    async function processMergeWithAnimation(lastActiveCol) {
      let keepMerging = true;
      let currentCombo = 0;

      while (keepMerging) {
        keepMerging = false;
        let targetCenter = null; 
        let blocksToMerge = [];  
        let multiplier = 2;      

        // 전체 격자 탐색으로 합치기 타겟 식별
        for (let c = 0; c < COLS; c++) {
          for (let r = 0; r < board[c].length; r++) {
            const val = board[c][r];
            if (!val) continue;

            const neighbors = [];
            // 아래
            if (r > 0 && board[c][r - 1] === val) neighbors.push({ c, r: r - 1 });
            // 위
            if (r < board[c].length - 1 && board[c][r + 1] === val) neighbors.push({ c, r: r + 1 });
            // 왼쪽
            if (c > 0 && board[c - 1].length > r && board[c - 1][r] === val) neighbors.push({ c: c - 1, r });
            // 오른쪽
            if (c < COLS - 1 && board[c + 1].length > r && board[c + 1][r] === val) neighbors.push({ c: c + 1, r });

            if (neighbors.length > 0) {
              // 수렴 위치 선정: "최근 떨어진 줄"을 우선시함
              let chosenCenter = { c, r };
              let chosenNeighbors = [...neighbors];

              const recentInNeighbors = neighbors.find(n => n.c === lastActiveCol);
              if (c !== lastActiveCol && recentInNeighbors) {
                chosenCenter = recentInNeighbors;
                chosenNeighbors = [{ c, r }];
                neighbors.forEach(n => {
                  if (n.c !== chosenCenter.c || n.r !== chosenCenter.r) {
                    chosenNeighbors.push(n);
                  }
                });
              }

              const count = chosenNeighbors.length;
              if (count === 1) multiplier = 2;
              else if (count === 2) multiplier = 4;
              else if (count >= 3) multiplier = 8;

              targetCenter = { ...chosenCenter, value: val * multiplier };
              blocksToMerge = chosenNeighbors;
              keepMerging = true;
              break;
            }
          }
          if (keepMerging) break;
        }

        if (targetCenter && keepMerging) {
          currentCombo++;
          if (currentCombo > maxCombo) {
            maxCombo = currentCombo;
            uiMaxCombo.textContent = `${maxCombo} Combo`;
          }

          if (currentCombo > 0) {
            triggerComboPopup(currentCombo);
          }

          // 콤보 가중치를 반영한 보너스 득점
          const rewardScore = targetCenter.value;
          const comboBonus = Math.floor(rewardScore * (currentCombo * 0.15));
          score += (rewardScore + comboBonus);
          mergeScore += rewardScore;

          // 보드 가변 반영
          board[targetCenter.c][targetCenter.r] = targetCenter.value;

          const removeMap = {};
          blocksToMerge.forEach(b => {
            if (!removeMap[b.c]) removeMap[b.c] = [];
            removeMap[b.c].push(b.r);
          });

          Object.keys(removeMap).forEach(cStr => {
            const colIdx = parseInt(cStr, 10);
            removeMap[colIdx].sort((a, b) => b - a);
            removeMap[colIdx].forEach(rowIdx => {
              board[colIdx].splice(rowIdx, 1);
            });
          });

          updateStaticUI();
          renderBoardWithTarget({
            center: targetCenter,
            neighbors: blocksToMerge
          });

          // 병합 연출 감상을 위해 지연
          await new Promise(resolve => setTimeout(resolve, 450));
          
          const tempMax = scanMaxBlock();
          updateSpawnPool(tempMax);
          lastActiveCol = targetCenter.c;
        }
      }
      
      renderBoard();
    }

    function scanMaxBlock() {
      let currentMax = 2;
      for (let c = 0; c < COLS; c++) {
        for (let r = 0; r < board[c].length; r++) {
          if (board[c][r] > currentMax) currentMax = board[c][r];
        }
      }
      maxBlock = currentMax;
      uiHighest.textContent = formatNumber(maxBlock);
      return currentMax;
    }

    // --- HTML 격자 그리기 모듈 ---
    function renderBoard() {
      boardContainer.innerHTML = '';
      for (let c = 0; c < COLS; c++) {
        const colDiv = document.createElement('div');
        colDiv.className = "flex-1 flex flex-col-reverse h-[410px] bg-gray-200/20 rounded-xl p-1 gap-1.5 relative cursor-pointer hover:bg-gray-200/40 transition-colors";
        colDiv.dataset.col = c;
        
        colDiv.addEventListener('click', () => handleColumnClick(c));

        if (board[c].length >= MAX_ROWS) {
          const warnBar = document.createElement('div');
          warnBar.className = "absolute top-0 left-0 w-full h-1.5 bg-rose-400 rounded-t-xl opacity-75 animate-pulse";
          colDiv.appendChild(warnBar);
        }

        board[c].forEach((val, rIdx) => {
          const block = document.createElement('div');
          block.className = "w-full aspect-square rounded-xl flex items-center justify-center font-black text-lg transition-all duration-300 origin-center border";
          
          const style = getBlockStyle(val);
          block.style.background = style.background;
          block.style.color = style.color;
          block.style.borderColor = style.borderColor;
          block.style.boxShadow = "inset 0 -4px 0 rgba(0,0,0,0.08), 0 3px 8px rgba(0,0,0,0.06)";
          
          block.textContent = formatNumber(val);

          // 망치 활성화 시
          if (isHammerActive) {
            block.className += " hover:scale-95 cursor-crosshair ring-4 ring-rose-400 animate-pulse scale-95 shadow-lg shadow-rose-400/20";
            block.addEventListener('click', (e) => {
              e.stopPropagation();
              handleBlockHammerClick(c, rIdx);
            });
          }

          colDiv.appendChild(block);
        });

        boardContainer.appendChild(colDiv);
      }
      updateUndoButton();
    }

    // 합성 효과 오버레이 연출
    function renderBoardWithTarget(effects) {
      boardContainer.innerHTML = '';
      for (let c = 0; c < COLS; c++) {
        const colDiv = document.createElement('div');
        colDiv.className = "flex-1 flex flex-col-reverse h-[410px] bg-gray-200/20 rounded-xl p-1 gap-1.5 relative cursor-pointer hover:bg-gray-200/40 transition-colors";
        
        if (board[c].length >= MAX_ROWS) {
          const warnBar = document.createElement('div');
          warnBar.className = "absolute top-0 left-0 w-full h-1.5 bg-rose-400 rounded-t-xl opacity-75 animate-pulse";
          colDiv.appendChild(warnBar);
        }

        board[c].forEach((val, rIdx) => {
          const block = document.createElement('div');
          block.className = "w-full aspect-square rounded-xl flex items-center justify-center font-black text-lg transition-all duration-300 origin-center border";
          
          const style = getBlockStyle(val);
          block.style.background = style.background;
          block.style.color = style.color;
          block.style.borderColor = style.borderColor;
          block.style.boxShadow = "inset 0 -4px 0 rgba(0,0,0,0.08), 0 3px 8px rgba(0,0,0,0.06)";
          block.textContent = formatNumber(val);

          const isCenter = effects.center.c === c && effects.center.r === rIdx;
          const isNeighbor = effects.neighbors.some(n => n.c === c && n.r === rIdx);

          if (isCenter) {
            block.className += " animate-merge-pop z-15 ring-4 ring-indigo-300";
          } else if (isNeighbor) {
            block.className += " animate-block-pop z-20";
          }

          colDiv.appendChild(block);
        });

        boardContainer.appendChild(colDiv);
      }
    }

    // 낙하 동작 중 전용 렌더러
    function renderBoardWithDrop(targetColIdx, targetRowIdx, dropVal) {
      boardContainer.innerHTML = '';
      for (let c = 0; c < COLS; c++) {
        const colDiv = document.createElement('div');
        colDiv.className = "flex-1 flex flex-col-reverse h-[410px] bg-gray-200/20 rounded-xl p-1 gap-1.5 relative cursor-pointer hover:bg-gray-200/40 transition-colors";
        
        colDiv.addEventListener('click', () => handleColumnClick(c));

        if (board[c].length >= MAX_ROWS) {
          const warnBar = document.createElement('div');
          warnBar.className = "absolute top-0 left-0 w-full h-1.5 bg-rose-400 rounded-t-xl opacity-75 animate-pulse";
          colDiv.appendChild(warnBar);
        }

        board[c].forEach((val, rIdx) => {
          const block = document.createElement('div');
          
          const style = getBlockStyle(val);
          block.style.background = style.background;
          block.style.color = style.color;
          block.style.borderColor = style.borderColor;
          block.style.boxShadow = "inset 0 -4px 0 rgba(0,0,0,0.08), 0 3px 8px rgba(0,0,0,0.06)";
          block.textContent = formatNumber(val);

          if (c === targetColIdx && rIdx === targetRowIdx) {
            block.className = "w-full aspect-square rounded-xl flex items-center justify-center font-black text-lg border animate-fall z-10";
          } else {
            block.className = "w-full aspect-square rounded-xl flex items-center justify-center font-black text-lg border transition-all duration-300 origin-center";
          }

          colDiv.appendChild(block);
        });

        boardContainer.appendChild(colDiv);
      }
    }

    // --- 화면 정보 인터페이스 전송기 ---
    function updateStaticUI() {
      uiScore.textContent = score.toLocaleString();
      uiDrops.textContent = `${dropsCount}회`;
      uiMergeScore.textContent = `${mergeScore.toLocaleString()}점`;
      uiMaxCombo.textContent = `${maxCombo} Combo`;
      
      const curStyle = getBlockStyle(currentBlock);
      blockCurrent.style.background = curStyle.background;
      blockCurrent.style.color = curStyle.color;
      blockCurrent.style.borderColor = curStyle.borderColor;
      blockCurrent.textContent = formatNumber(currentBlock);

      const nxtStyle = getBlockStyle(nextBlock);
      blockNext.style.background = nxtStyle.background;
      blockNext.style.color = nxtStyle.color;
      blockNext.style.borderColor = nxtStyle.borderColor;
      blockNext.textContent = formatNumber(nextBlock);
    }

    // --- 게임 액션 조작 엔진 ---
    async function handleColumnClick(cIdx) {
      if (gameOver || isHammerActive || isAnimating) return;
      
      const targetCol = board[cIdx];
      if (targetCol.length >= MAX_ROWS) return;

      saveToHistory();
      isAnimating = true;
      dropsCount++; 

      const targetRowIdx = targetCol.length;
      
      board[cIdx].push(currentBlock);
      renderBoardWithDrop(cIdx, targetRowIdx, currentBlock);

      // 1초 드롭 모션 대기
      await new Promise(resolve => setTimeout(resolve, 1000));

      // 연쇄 병합
      await processMergeWithAnimation(cIdx);

      const updatedMax = scanMaxBlock();
      const updatedMin = updateSpawnPool(updatedMax);

      // 다음 턴 블록 준비
      currentBlock = nextBlock < updatedMin ? updatedMin : nextBlock;
      nextBlock = getRandomBlock(updatedMin);
      
      isAnimating = false;
      updateStaticUI();
      renderBoard();

      if (board.every(col => col.length >= MAX_ROWS)) {
        gameOver = true;
        gameOverScreen.classList.remove('hidden');
      }
    }

    // 망치 도구 격파
    async function handleBlockHammerClick(cIdx, rIdx) {
      if (!isHammerActive || isAnimating) return;
      
      saveToHistory();
      isAnimating = true;

      renderBoardWithTarget({
        center: { c: -1, r: -1 },
        neighbors: [{ c: cIdx, r: rIdx }]
      });

      await new Promise(resolve => setTimeout(resolve, 300));

      board[cIdx].splice(rIdx, 1);
      isHammerActive = false;
      
      await processMergeWithAnimation(cIdx);
      scanMaxBlock();

      isAnimating = false;
      btnHammer.className = "flex items-center space-x-1.5 px-5 py-3 rounded-2xl font-bold border border-gray-200 bg-white text-gray-700 shadow-md hover:border-gray-300 transition-all duration-200 active:scale-95";
      hammerText.textContent = "무제한 망치 사용";

      updateStaticUI();
      renderBoard();
    }

    function initGame() {
      board = Array.from({ length: COLS }, () => []);
      currentBlock = 2;
      nextBlock = 4;
      score = 0;
      mergeScore = 0;
      dropsCount = 0;
      maxCombo = 0;
      maxBlock = 2;
      minSpawnValue = 2;
      gameOver = false;
      isHammerActive = false;
      isAnimating = false;
      historyStack = [];

      gameOverScreen.classList.add('hidden');
      spawnBanner.classList.add('hidden');
      
      btnHammer.className = "flex items-center space-x-1.5 px-5 py-3 rounded-2xl font-bold border border-gray-200 bg-white text-gray-700 shadow-md hover:border-gray-300 transition-all duration-200 active:scale-95";
      hammerText.textContent = "무제한 망치 사용";

      updateStaticUI();
      renderBoard();
    }

    // --- 조작부 이벤트 핸들러 바인딩 ---
    btnReset.addEventListener('click', initGame);
    btnOverReset.addEventListener('click', initGame);
    btnUndo.addEventListener('click', handleUndo);

    btnSwap.addEventListener('click', () => {
      if (gameOver || isAnimating) return;
      saveToHistory();
      const temp = currentBlock;
      currentBlock = nextBlock;
      nextBlock = temp;
      updateStaticUI();
    });

    btnHammer.addEventListener('click', () => {
      if (gameOver || isAnimating) return;
      isHammerActive = !isHammerActive;
      if (isHammerActive) {
        btnHammer.className = "flex items-center space-x-1.5 px-5 py-3 rounded-2xl font-bold bg-rose-500 text-white shadow-lg shadow-rose-500/30 scale-105 transition-all duration-200 active:scale-95";
        hammerText.textContent = "부술 블록을 터치하세요";
      } else {
        btnHammer.className = "flex items-center space-x-1.5 px-5 py-3 rounded-2xl font-bold border border-gray-200 bg-white text-gray-700 shadow-md hover:border-gray-300 transition-all duration-200 active:scale-95";
        hammerText.textContent = "무제한 망치 사용";
      }
      renderBoard();
    });

    // 앱 기동
    window.onload = () => {
      initGame();
      lucide.createIcons();
    };
  </script>
</body>
</html>
